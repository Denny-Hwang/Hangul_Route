name: Content Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "content/**"
      - "packages/content-schema/**"

concurrency:
  group: content-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: zod schema + language policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run content-schema tests (zod fixtures)
        run: pnpm --filter @hangul-route/content-schema test

      - name: Validate language policy
        env:
          POLICY: .claude/skills/content-skill/SKILL.md
        run: |
          echo "::notice::Language policy source of truth: $POLICY"
          echo "::notice::Content validator script lands with F-CNT-001."
          # TODO(F-CNT-001): walk content/**/*.json and enforce:
          #   - UI strings in English (CEFR Pre-A1)
          #   - Korean only on learning target fields
          #   - romanization present alongside every Korean string
          #   - English gloss present for every Korean learning item
