name: Coverage Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Measure coverage vs rolling targets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm -r test -- --coverage --reporter=default --reporter=json-summary

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/coverage/coverage-summary.json
            **/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce rolling targets (business vs platform split)
        env:
          TARGETS_FILE: docs/tests/coverage-targets.md
        run: |
          echo "::notice::Coverage gate uses $TARGETS_FILE as source of truth."
          echo "::notice::Enforcement script lands with the first real test suite."
          # TODO(F-COV-001): parse coverage-summary.json per package and compare
          # against the W4 column in $TARGETS_FILE. Split apps/mobile into
          # src/logic (business) and src/platform (platform-dependent) lanes.
