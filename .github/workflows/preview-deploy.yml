name: Preview Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/design-system/**"

concurrency:
  group: preview-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Cloudflare Pages preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Deployment needs repo-level secrets that only maintainers configure.
    # Forks and routine PRs run the build but skip the upload step.
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @hangul-route/web build

      - name: Skip upload (secrets not configured)
        if: ${{ env.CF_API_TOKEN == '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping Pages upload."
          echo "::notice::Set repo secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to enable."

      - name: Publish to Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/pages-action@v1
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: hangul-route-web
          directory: apps/web/.next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
